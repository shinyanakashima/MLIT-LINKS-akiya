name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 同時実行は最新のみ
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # P5(MLIT-LINKS-akiya-pipeline)が正規化レコードJSONを供給するまでの暫定:
      # ローカルの生CSVから正規化レコードを生成する。P5完成後はこのステップを
      # 「P5成果物の取得 (例: actions/download-artifact)」に差し替える。
      - name: Normalize raw CSV (暫定 / P5代替)
        run: python3 scripts/normalize.py

      - name: Aggregate -> public/data/aggregates.json
        run: python3 scripts/aggregate.py

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci
      - run: npm run build

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
